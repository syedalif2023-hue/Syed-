<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed Kirana - Login System</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .reg-btn { background: #28a745; color: white; }
        .log-btn { background: #007bff; color: white; }
        .toggle-link { color: #007bff; cursor: pointer; font-size: 14px; margin-top: 15px; display: block; }
    </style>
</head>
<body>

<div class="box">
    <h2 id="title">Create Account</h2>
    
    <input type="text" id="custName" placeholder="Full Name (For Register Only)">
    <input type="number" id="mobile" placeholder="Mobile Number">
    <input type="password" id="pass" placeholder="Password (Min 6 letters)">

    <div id="action-area">
        <button class="reg-btn" onclick="handleRegister()">Register Now</button>
        <span class="toggle-link" onclick="showLogin()">Already have account? Login</span>
    </div>

    <p id="status" style="margin-top:15px; font-size:14px;"></p>
</div>

<script type="module" src="firebase-config.js"></script>

<script>
    let isLoginMode = false;

    function showLogin() {
        isLoginMode = true;
        document.getElementById('title').innerText = "User Login";
        document.getElementById('custName').style.display = 'none';
        document.getElementById('action-area').innerHTML = `
            <button class="log-btn" onclick="handleLogin()">Login</button>
            <span class="toggle-link" onclick="location.reload()">New user? Register</span>
        `;
    }

    function handleRegister() {
        const mobile = document.getElementById('mobile').value;
        const pass = document.getElementById('pass').value;
        const status = document.getElementById('status');

        if(mobile.length < 10 || pass.length < 6) {
            alert("Mobile 10 digit aur Password 6 digit ka hona chahiye!");
            return;
        }

        registerUser(mobile, pass).then(() => {
            status.innerText = "Registration Success! Ab login karein.";
            status.style.color = "green";
            showLogin();
        }).catch(err => {
            status.innerText = "Error: " + err.message;
            status.style.color = "red";
        });
    }

    function handleLogin() {
        const mobile = document.getElementById('mobile').value;
        const pass = document.getElementById('pass').value;
        const status = document.getElementById('status');

        loginUser(mobile, pass).then((res) => {
            alert("Welcome! Login Successful.");
            status.innerText = "Logged in as: " + mobile;
            // Dashboard par bhejne ke liye: window.location.href = "dashboard.html";
        }).catch(err => {
            status.innerText = "Login Failed: Check Number/Password";
            status.style.color = "red";
        });
    }
</script>

</body>
</html>
