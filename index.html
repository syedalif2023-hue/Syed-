<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Register & Login</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; margin-top: 50px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #otp-section { display: none; }
        .status { font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center;">Registration</h2>
    
    <div id="register-section">
        <input type="text" id="custName" placeholder="Customer Name">
        <input type="text" id="custPhone" placeholder="+91 9876543210">
        <div id="recaptcha-container"></div>
        <button onclick="handleSendOTP()">Get OTP</button>
    </div>

    <div id="otp-section">
        <p>Mobile: <span id="displayPhone"></span></p>
        <input type="text" id="otpCode" placeholder="6-digit OTP">
        <button onclick="handleVerifyOTP()" style="background: #28a745;">Verify & Login</button>
    </div>

    <div id="msg" class="status"></div>
</div>

<script type="module" src="firebase-config.js"></script>

<script>
    let confirmationResult;

    // Load Recaptcha on start
    window.onload = () => {
        setTimeout(() => { if(window.initRecaptcha) window.initRecaptcha(); }, 1500);
    };

    function handleSendOTP() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;

        if(!name || !phone.startsWith("+91")) {
            alert("Kripya Name aur Number (+91 ke sath) sahi se bharein.");
            return;
        }

        window.sendOTP(phone).then(res => {
            confirmationResult = res;
            document.getElementById('displayPhone').innerText = phone;
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'block';
            document.getElementById('msg').innerText = "OTP bhej diya gaya hai!";
            document.getElementById('msg').style.color = "green";
        }).catch(err => {
            document.getElementById('msg').innerText = "Error: " + err.message;
            document.getElementById('msg').style.color = "red";
        });
    }

    function handleVerifyOTP() {
        const code = document.getElementById('otpCode').value;
        const name = document.getElementById('custName').value;

        confirmationResult.confirm(code).then(result => {
            const user = result.user;
            document.getElementById('msg').innerText = "Welcome " + name + "!";
            document.getElementById('msg').style.color = "blue";
            
            // Yahan se aap user ko redirect kar sakte hain ya data save kar sakte hain
            console.log("Logged In User:", user.phoneNumber);
            alert("Login Successful!");
        }).catch(err => {
            alert("Galat OTP! Koshish karein.");
        });
    }
</script>

</body>
</html>
